services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    # Raise connection ceiling and tune shared memory for higher throughput.
    # 300 connections covers all 5 services (up to 120 each for user-service
    # under load + ~30 each for the rest) with headroom for pgAdmin/migrations.
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c max_wal_size=1GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - usernet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 60s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - usernet
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    env_file:
      - .env
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 60s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${APIGATEWAY_SERVICE_REDIS_DB}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8000:8000"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Main app router: handles all traffic for the apex domain and www (www redirects to apex).
      - "traefik.http.routers.api-gateway.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.api-gateway.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.api-gateway.tls.certresolver=${CERT_RESOLVER:-}"
      - "traefik.http.routers.api-gateway.middlewares=www-to-apex@file,rate-limit-api@file,compress@file"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8000"
      - "traefik.http.services.api-gateway.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api-gateway.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.api-gateway.loadbalancer.passHostHeader=true"

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${USER_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${USER_SERVICE_REDIS_DB}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8001:8001"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  product-service:
    build:
      context: ./product_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PRODUCT_SERVICE_DB}
      MEDIA_ROOT: /media
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${PRODUCT_SERVICE_REDIS_DB}
    volumes:
      - product_media:/media
      - ./shared:/app/shared:ro
    ports:
      - "8002:8002"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  product-consumer:
    build:
      context: ./product_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${NOTIFICATION_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${NOTIFICATION_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    ports:
      - "8003:8003"
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  notification-consumer:
    build:
      context: ./notification_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro

  notification-taskiq-worker:
    build:
      context: ./notification_service
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro

  order-service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${ORDER_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${ORDER_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8005:8005"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  order-consumer:
    build:
      context: ./order_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PAYMENT_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${PAYMENT_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8006:8006"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  payment-consumer:
    build:
      context: ./payment_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  admin-js-service:
    build:
      context: ./admin-js-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - usernet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-js.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.admin-js.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.admin-js.tls.certresolver=${CERT_RESOLVER:-}"
      - "traefik.http.routers.admin-js.middlewares=admin-ip-allowlist@file"
      - "traefik.http.services.admin-js.loadbalancer.server.port=3000"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector.yml"]
    volumes:
      - ./otelcollector/otel-collector.yml:/etc/otelcol/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - usernet
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - usernet

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    depends_on:
      - alertmanager
    networks:
      - usernet

  alertmanager:
    image: prom/alertmanager:v0.32.1
    ports: ["9093:9093"]
    volumes:
      - ./alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - ./alertmanager/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    networks:
      - usernet
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1-security-01
    ports: ["3002:3000"]
    environment:
      # Stable secret key prevents session invalidation on container restarts.
      # Generate once: python3 -c "import secrets; print(secrets.token_hex(32))"
      # then add GRAFANA_SECRET_KEY=<value> to your .env file.
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - usernet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.grafana.tls.certresolver=${CERT_RESOLVER:-}"
      - "traefik.http.routers.grafana.middlewares=admin-ip-allowlist@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.7.2
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - usernet

  promtail:
    image: grafana/promtail:3.6.11
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - usernet

  # CPU / RAM / net / disk metrics per container
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    privileged: true          # required on modern kernels for full cgroup access
    ports: ["8080:8080"]
    devices:
      - /dev/kmsg             # kernel message ring buffer access
    volumes:
      - /:/rootfs:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro   # name-label resolution
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --docker_only=true                      # skip non-Docker cgroups (system, init, etc.)
      - --store_container_labels=false          # suppress Docker label bloat on every metric
      - --housekeeping_interval=30s             # scrape every 30 s (matches Prometheus)
      - --max_housekeeping_interval=35s
      - --disable_metrics=advtcp,cpuset,hugetlb,referenced_memory,resctrl,tcp,udp
    networks:
      - usernet

  # Docker socket proxy: rewrites Traefik's hardcoded API v1.24 → v1.41 so it
  # works with OrbStack (which rejects anything below 1.40). Only Traefik
  # connects to this proxy; it should never be exposed to other services.
  socket-proxy:
    image: nginx:alpine
    restart: always
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./traefik/socket-proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      - usernet

  # Edge proxy: TLS termination, HTTP→HTTPS redirect, security headers,
  # edge rate limiting, and routing to api-gateway / admin tools.
  # Requires DOMAIN and ACME_EMAIL in .env.
  # On first deploy: touch traefik/acme.json && chmod 600 traefik/acme.json
  traefik:
    image: traefik:v3.7.1
    restart: always
    ports:
      - "80:80"
      - "443:443"
      # Local dev: Traefik dashboard at http://localhost:8090/dashboard/
      - "8090:8090"
    volumes:
      # No docker.sock mount here — traffic goes through socket-proxy instead.
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme.json:/acme/acme.json
    networks:
      - usernet
    depends_on:
      socket-proxy:
        condition: service_started
      api-gateway:
        condition: service_healthy
    labels:
      # OrbStack: forward *.orb.local traffic to port 8090 (plain HTTP, no TLS clash).
      - "dev.orbstack.http-port=8090"
      - "traefik.enable=true"
      # Traefik dashboard — restricted to private IPs only (see admin-ip-allowlist in dynamic.yml).
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=${CERT_RESOLVER:-}"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=admin-ip-allowlist@file"


networks:
  usernet:
    name: usernet


volumes:
  postgres_data:
  product_media:
  redis_data:
  rabbitmq_data:
  prom_data:
  grafana_data:
  alertmanager_data:
  tempo_data:



