services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    # Raise connection ceiling and tune shared memory for higher throughput.
    # 300 connections covers all 5 services (up to 120 each for user-service
    # under load + ~30 each for the rest) with headroom for pgAdmin/migrations.
    command: >
      postgres
        -c max_connections=300
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c max_wal_size=1GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - usernet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 60s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - usernet
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    env_file:
      - .env
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 60s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${APIGATEWAY_SERVICE_REDIS_DB}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8000:8000"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${USER_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${USER_SERVICE_REDIS_DB}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8001:8001"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  product-service:
    build:
      context: ./product_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PRODUCT_SERVICE_DB}
      MEDIA_ROOT: /media
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${PRODUCT_SERVICE_REDIS_DB}
    volumes:
      - product_media:/media
      - ./shared:/app/shared:ro
    ports:
      - "8002:8002"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  product-consumer:
    build:
      context: ./product_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${NOTIFICATION_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${NOTIFICATION_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    ports:
      - "8003:8003"
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  notification-consumer:
    build:
      context: ./notification_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro

  notification-taskiq-worker:
    build:
      context: ./notification_service
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro
      - ./shared/templates:/app/templates:ro

  order-service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${ORDER_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${ORDER_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8005:8005"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  order-consumer:
    build:
      context: ./order_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  payment-service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${PAYMENT_SERVICE_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}/${PAYMENT_SERVICE_REDIS_DB}
      RABBITMQ_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
    volumes:
      - ./shared:/app/shared:ro
    ports:
      - "8006:8006"
    networks:
      - usernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  payment-consumer:
    build:
      context: ./payment_service
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - usernet
    volumes:
      - ./shared:/app/shared:ro

  admin-js-service:
    build:
      context: ./admin-js-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - usernet

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - usernet

  grafana:
    image: grafana/grafana:latest
    ports: ["3002:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - usernet

  # CPU / RAM/ net/ disk metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports: ["8080:8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - usernet


networks:
  usernet:


volumes:
  postgres_data:
  product_media:
  redis_data:
  rabbitmq_data:
  prom_data:
  grafana_data:


