global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "fastapi-users"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: "fastapi-api-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "fastapi-products"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["product-service:8002"]

  - job_name: "fastapi-notifications"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["notification-service:8003"]

  - job_name: "fastapi-orders"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["order-service:8005"]

  - job_name: "fastapi-payments"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["payment-service:8006"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]