global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "fastapi-users"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]