# Nginx Docker socket proxy — rewrites Traefik's hardcoded v1.24 API version
# to v1.41+ so it works with OrbStack (which requires minimum API 1.40).
#
# Traefik v3 hardcodes "1.24" in its source via client.WithVersion("1.24").
# The DOCKER_API_VERSION env var is ignored. This proxy intercepts every
# request from Traefik and rewrites the version prefix before forwarding to
# the real Docker socket.

# Worker must run as root to access the Docker socket (owner: root:root, mode 0660).
user root;
worker_processes 1;
error_log /dev/stderr warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log off;

    upstream docker_socket {
        server unix:/var/run/docker.sock;
    }

    server {
        listen 2375;

        # Accept large request bodies (image builds, etc.) and don't buffer
        # streaming responses (docker events, exec, logs).
        client_max_body_size 0;
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_read_timeout       3600s;
        proxy_send_timeout       3600s;
        proxy_http_version       1.1;
        # WebSocket / hijacked connections (exec, attach)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;

        # Rewrite any /vX.Y/ prefix to /v1.41/ and proxy to the socket.
        location ~ "^/v[0-9]+\.[0-9]+/(.+)$" {
            rewrite "^/v[0-9]+\.[0-9]+/(.+)$" /v1.41/$1 break;
            proxy_pass http://docker_socket;
        }

        # Pass non-versioned paths through unchanged.
        location / {
            proxy_pass http://docker_socket;
        }
    }
}
