services:
  user-service-test:
    build:
      context: ./user_service
      dockerfile: Dockerfile
      target: test
    volumes:
      - ./shared:/app/shared:ro
    networks:
      - usernet
    profiles:
      - test
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

  product-service-test:
    build:
      context: ./product_service
      dockerfile: Dockerfile
      target: test
    volumes:
      - ./shared:/app/shared:ro
    networks:
      - usernet
    profiles:
      - test
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

  payment-service-test:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
      target: test
    volumes:
      - ./shared:/app/shared:ro
    networks:
      - usernet
    profiles:
      - test
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"
