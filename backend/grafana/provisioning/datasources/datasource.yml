apiVersion: 1

# Delete any previously provisioned datasources so the UIDs below are applied cleanly.
# This is needed when upgrading from a provisioning file that didn't set explicit UIDs.
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: Alertmanager
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    orgId: 1
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1

  - name: Loki
    type: loki
    uid: loki
    orgId: 1
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    version: 1
    jsonData:
      maxLines: 1000

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    orgId: 1
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: true
    version: 1
    jsonData:
      implementation: prometheus

  - name: Tempo
    type: tempo
    uid: tempo
    orgId: 1
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    version: 1
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
